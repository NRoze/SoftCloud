apiVersion: apps/v1
kind: Deployment
metadata:
  name: softcloud-api
  labels:
    app: softcloud-api
spec:
  replicas: 2 # We want 2 instances of our API running for high availability
  selector:
    matchLabels:
      app: softcloud-api
  template:
    metadata:
      labels:
        app: softcloud-api
    spec:
      containers:
      - name: softcloud-api
        image: softcloud-api:latest
        imagePullPolicy: Never # Never pull from registry, use the local image we just built
        ports:
        - containerPort: 8080
        resources:
          # Best Practice: Always define CPU/Memory requests and limits
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "128Mi"
            cpu: "250m"
        # Best Practice: Liveness probe tells k8s if the container is healthy/alive. If it fails, k8s restarts the pod.
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 3
          periodSeconds: 10
        # Best Practice: Readiness probe tells k8s if the container is ready to accept traffic.
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 3
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: softcloud-api-service
spec:
  # A LoadBalancer service asks Kubernetes to provision an external IP (Docker Desktop handles this locally)
  type: LoadBalancer 
  selector:
    # This must match the label in the Deployment template
    app: softcloud-api
  ports:
    - protocol: TCP
      port: 8080 # The port the LoadBalancer listens on
      targetPort: 8080 # The port the container listens on
